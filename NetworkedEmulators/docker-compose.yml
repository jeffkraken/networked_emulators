services:

  firered:
    build: .
    container_name: firered
    ports:
      - "8080:8080"   # web
      - "6000:6000"   # link
    environment:
      - ROM_PATH=/roms/pokemon_firered.gba
      - THEME=firered
      - LINK_MODE=host
      - LINK_PORT=6000
    volumes:
      - ./roms:/roms
      - ./saves/firered:/saves
    networks:
      - pkmn-net

  leafgreen:
    build: .
    container_name: leafgreen
    ports:
      - "8081:8080"   # web
    environment:
      - ROM_PATH=/roms/pokemon_leafgreen.gba
      - THEME=leafgreen
      - LINK_MODE=client
      - LINK_HOST=firered
      - LINK_PORT=6000
    depends_on:
      - firered
    volumes:
      - ./roms:/roms
      - ./saves/leafgreen:/saves
    networks:
      - pkmn-net

networks:
  pkmn-net:
    driver: bridge